<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Othello logo">
  <defs>
    <linearGradient id="boardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f8a45"/>
      <stop offset="100%" stop-color="#146534"/>
    </linearGradient>
    <radialGradient id="blackDisc" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="whiteDisc" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="24" fill="url(#boardBg)" stroke="#22c55e" stroke-width="6"/>

  <g stroke="rgba(255,255,255,0.14)" stroke-width="1">
    <line x1="72" y1="24" x2="72" y2="232"/>
    <line x1="128" y1="24" x2="128" y2="232"/>
    <line x1="184" y1="24" x2="184" y2="232"/>
    <line x1="24" y1="72" x2="232" y2="72"/>
    <line x1="24" y1="128" x2="232" y2="128"/>
    <line x1="24" y1="184" x2="232" y2="184"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="106" cy="106" r="24" fill="url(#whiteDisc)" />
    <circle cx="150" cy="150" r="24" fill="url(#whiteDisc)" />
    <circle cx="150" cy="106" r="24" fill="url(#blackDisc)" />
    <circle cx="106" cy="150" r="24" fill="url(#blackDisc)" />
  </g>
</svg>
